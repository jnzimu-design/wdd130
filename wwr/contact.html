<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Get in touch with White Water Rafting Company. Find our address, phone, email, and contact form.">
    <meta name="author" content="Jacques O. Nzimu">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="Rafting Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- Company Info -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- Map + Form -->
        <section class="contact-grid">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7867.38101153377!2d-13.622439625698508!3d9.621894349596147!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sfr!2s!4v1776506175332!5m2!1sfr!2s"
                  width="100%" height="300" loading="lazy">
                </iframe>
            </div>

            <div class="contact-form">
                <h2>Get in Touch</h2>
                <form action="#" method="post">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Placeholder" required>

                    <fieldset>
                        <legend>Message Purpose</legend>

                        <label for="general">
                            <input type="radio" id="general" name="purpose" value="general">
                            General Inquiry
                        </label>

                        <label for="reservation">
                            <input type="radio" id="reservation" name="purpose" value="reservation">
                            Reservation Question
                        </label>

                        <label for="suggestion">
                            <input type="radio" id="suggestion" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>

                    </fieldset>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>

                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>

        </section>

        <!-- Employees -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Reservation Manager">
                <figcaption>Rachel Kpogomou - Reservation Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Safety Coordinator">
                <figcaption>Christ MZ - Safety Coordinator</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Lead Guide">
                <figcaption>Doms Nzimu - Lead Guide</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>© 2026 Rafting Company | Jacques Nzimu</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
